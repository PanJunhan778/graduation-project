server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ems?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: your_db_username
    password: your_db_password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 86400
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
  jwt-secret-key: your_jwt_secret

logging:
  level:
    com.pjh.server: debug

app:
  ai:
    enabled: true
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: your_ai_api_key
    model: qwen3.5-flash
    timeout: 60s
